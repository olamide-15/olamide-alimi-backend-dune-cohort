{% extends 'base.html' %}

{% block content %}
<h1>{{ product.name }}</h1>
<div class="card" >
    <div class="card-body">
        <p><strong>Price:</strong> ₦{{ product.price }}</p>
        <p><strong>Stock:</strong> {{ product.stock }}</p>
        <p><strong>Category:</strong> {{ product.category }}</p>
        {% if product.stock > 0 %}
        <span class="bad1">In Stock</span>
        {% else %}
        <span class="bad2">Out of Stock</span>
        {% endif %}
    </div>
</div>
<br>
<a href="/products/" class="btn">← Back to Products</a>
{% endblock %}

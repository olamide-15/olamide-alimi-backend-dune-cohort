{% extends 'base.html' %}

{% block content %}
<h1>Categories 📂</h1>
<div class="row">
    {% for category in categories %}
    <div class="col-md-3 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ category.name }}</h5>
                <p class="card-text">{{ category.description }}</p>
                <p class="card-text">
                    <strong>Number of Products:</strong> {{ category.product_count }}
                </p>
                <a href="{% url 'category_update' category.pk %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'category_delete' category.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

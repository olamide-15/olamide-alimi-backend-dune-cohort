{% extends 'products/base.html' %}
{% block content %}
    <h2>Delete{{ product.name}}?</h2>
    <p>This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete it</button>
        <a href="{% url 'category_list' %}">Cancel</a>
    </form>
{% endblock %}

{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ToriloShop{% endblock %}</title>
  <!-- {% static 'path' %} generates the correct URL to the file -->
  <link rel='stylesheet' href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/product.css' %}">
  <link rel="stylesheet" href="{% static 'css/home.css' %}">

  
</head>
<body>

  <script src="{% static 'js/main.js' %}"></script>
  
  <nav>
    <a href="/" class="logo">
      <img src="{% static 'images/logo.png' %}" alt="ToriloShop Logo">
    </a>

    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/products">Products</a>
      <a href="/about">About</a>
    </div>
  </nav>

  <main>
    <!-- Display flash messages in base.html so they appear on every page -->
  {% if messages %}
    {% for message in messages %}
      <div class='alert alert-{{ message.tags }}'>
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>ToriloShop &copy; 2026</p>
  </footer>
</body>
</html>
